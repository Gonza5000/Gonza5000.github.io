<!DOCTYPE html>
<html>
    <head>
        <title>Busqueda Avanzada</title>
        <link rel="stylesheet" href="index_estilo.css">
    </head>
    <body>
        <img style="margin: 10px;" src="logo-Google.png" alt="Google Logo" width="75">
        <div id="derecha">
            <div id="espacio2">
                <a href="index.html">
                    <input type="submit" value="Google">
                </a>
            </div>
        </div>
        <div id="avanzado">
            <h1 style="color: red; font-family: Arial, sans-serif, Helvetica;">Busqueda Avanzada</h1>
        </div>
        <div id="linea"></div>
        <div style="padding-top: 20px;margin-left: 30px ;">
            <h0 style="font-family:Arial, sans-serif, Helvetica; font-size: 20px;">Buscar páginas con...</h0>
        </div>    
        <div>
            <form action="https://google.com/search">
                <div id="separar">
                    <h0 class="texto" id="todo">Todas estas palabras:</h0>
                    <input class="cuadros" type="text" name="as_q">
                </div>
                <div id="separar">
                    <h0 class="texto" id="exacto">Esta palabra o frase exactas:</h0>
                    <input class="cuadros" type="text" name="as_epq">
                </div>
                <div id="separar">
                    <h0 class="texto" id="cualquiera">Cualquiera de estas palabras:</h0>
                    <input class="cuadros" type="text" name="as_oq">
                </div>
                <div id="separar">
                    <h0 class="texto" id="ninguna">Ninguna de estas palabras:</h0>
                    <input class="cuadros" type="text" name="as_eq">
                </div>
                <center style="margin-top: 50px;">
                    <input id="busca_avanzada" type="submit" value="Busqueda Avanzada">
                </center>
            </form>
        </div>
    </body>
</html>
